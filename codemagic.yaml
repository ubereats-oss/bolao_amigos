workflows:
  ios-release:
    name: iOS Release
    environment:
      flutter: stable

    scripts:
      - name: Clean Flutter
        script: |
          flutter clean

      - name: Remove Pods cache
        script: |
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Analyze
        script: |
          flutter analyze --no-pub

      - name: Test
        script: |
          flutter test --no-pub

      - name: Install pods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS
        script: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          BUILD_NAME=${VERSION%%+*}
          PUBSPEC_BUILD_NUMBER=${VERSION##*+}
          BASE_BUILD_NUMBER=${PROJECT_BUILD_NUMBER:-${BUILD_NUMBER:-0}}
          BUILD_NUMBER=$((BASE_BUILD_NUMBER + PUBSPEC_BUILD_NUMBER))
          export FLUTTER_BUILD_NAME="$BUILD_NAME"
          export FLUTTER_BUILD_NUMBER="$BUILD_NUMBER"
          cd ios
          agvtool new-version -all "$BUILD_NUMBER"
          cd ..
          flutter build ipa --release --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

    artifacts:
      - build/ios/ipa/*.ipa
