workflows:
  ios-release:
    name: iOS Release
    environment:
      flutter: stable

    scripts:
      - name: Clean Flutter
        script: |
          flutter clean

      - name: Remove Pods cache
        script: |
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Analyze
        script: |
          flutter analyze --no-pub

      - name: Test
        script: |
          flutter test --no-pub

      - name: Install pods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS
        script: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          BUILD_NAME=${VERSION%%+*}
          BUILD_NUMBER=${VERSION##*+}
          echo ">>> BUILD_NAME=$BUILD_NAME BUILD_NUMBER=$BUILD_NUMBER"
          cd ios && agvtool new-version -all "$BUILD_NUMBER" && cd ..
          flutter build ipa --release --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

    artifacts:
      - build/ios/ipa/*.ipa

  ios-release-colegas:
    name: iOS Release — Bolão com Colegas
    environment:
      flutter: stable

    scripts:
      - name: Clean Flutter
        script: |
          flutter clean

      - name: Remove Pods cache
        script: |
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Analyze
        script: |
          flutter analyze --no-pub

      - name: Test
        script: |
          flutter test --no-pub

      - name: Install pods
        script: |
          cd ios
          pod install --repo-update

      - name: Configurar Bolão com Colegas
        script: |
          cp ios/Runner/GoogleService-Info_colegas.plist ios/Runner/GoogleService-Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.salles.bolaocopadomundo" ios/Runner/Info.plist
          LC_ALL=C sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com\.salles\.bolao;/PRODUCT_BUNDLE_IDENTIFIER = com.salles.bolaocopadomundo;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Build iOS
        script: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          BUILD_NAME=${VERSION%%+*}
          BUILD_NUMBER=${VERSION##*+}
          echo ">>> BUILD_NAME=$BUILD_NAME BUILD_NUMBER=$BUILD_NUMBER"
          cd ios && agvtool new-version -all "$BUILD_NUMBER" && cd ..
          flutter build ipa --release --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

    artifacts:
      - build/ios/ipa/*.ipa
