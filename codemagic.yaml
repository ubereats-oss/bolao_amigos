workflows:
  ios-release:
    name: iOS Release
    environment:
      flutter: stable

    scripts:
      - name: Clean Flutter
        script: |
          flutter clean

      - name: Remove Pods cache
        script: |
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Analyze
        script: |
          flutter analyze --no-pub

      - name: Test
        script: |
          flutter test --no-pub

      - name: Install pods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS
        script: |
          BUILD_NAME=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          BASE_BUILD_NUMBER=${PROJECT_BUILD_NUMBER:-${BUILD_NUMBER:-0}}
          BUILD_NUMBER=$((BASE_BUILD_NUMBER + 200))
          flutter build ipa --release --build-name="$BUILD_NAME" --build-number="$BUILD_NUMBER"

    artifacts:
      - build/ios/ipa/*.ipa
