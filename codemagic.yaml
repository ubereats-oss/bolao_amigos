workflows:
  ios-release:
    name: iOS Release
    environment:
      flutter: stable

    scripts:
      - name: Clean Flutter
        script: |
          flutter clean

      - name: Remove Pods cache
        script: |
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock

      - name: Install dependencies
        script: |
          flutter pub get

      - name: Analyze
        script: |
          flutter analyze --no-pub

      - name: Test
        script: |
          flutter test --no-pub

      - name: Install pods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
